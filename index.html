<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poseidon House Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(10, 25, 47, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.2);
            margin-bottom: 25px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .container:hover {
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0, 229, 255, 0.15);
        }
        h1 {
            text-align: center;
            color: #00e5ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 0;
            font-size: 28px;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }
        h3 {
            text-align: center;
            color: #ffb300;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p.subtitle {
            text-align: center;
            color: #8892b0;
            font-size: 15px;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin: 15px 0 8px;
            font-weight: 600;
            color: #64ffda;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            background: rgba(2, 12, 27, 0.6);
            color: #f8fafc;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        select:focus, textarea:focus {
            outline: none;
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
            background: rgba(2, 12, 27, 0.8);
        }
        select option {
            background: #0a192f;
            color: #fff;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00b8d4, #00e5ff);
            border: none;
            color: #020c1b;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4);
        }
        .admin-btn {
            background: transparent;
            border: 1px solid #ffb300;
            color: #ffb300;
            margin-top: 15px;
            box-shadow: none;
        }
        .admin-btn:hover {
            background: rgba(255, 179, 0, 0.1);
            box-shadow: 0 0 15px rgba(255, 179, 0, 0.2);
            color: #ffb300;
        }
        .chat-box {
            background: rgba(2, 12, 27, 0.6);
            padding: 20px;
            border-radius: 12px;
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .message {
            border-left: 4px solid #00e5ff;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 15px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tag-row {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tag-group {
            display: flex;
        }
        .tag {
            font-size: 11px;
            background: rgba(0, 229, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            color: #00e5ff;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 6px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }
        .tag.type-tag {
            background: rgba(100, 255, 218, 0.1);
            color: #64ffda;
            border-color: rgba(100, 255, 218, 0.2);
        }
        .time-stamp {
            font-size: 11px;
            color: #8892b0;
        }
        .hidden {
            display: none;
        }
        .admin-panel {
            border: 1px solid #ffb300;
            box-shadow: 0 10px 40px rgba(255, 179, 0, 0.05);
        }
        .msg-text {
            margin: 5px 0 0 0;
            color: #ccd6f6;
            line-height: 1.5;
        }
        .status-text {
            text-align: center;
            color: #8892b0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔱 Poseidon Dashboard 🔱</h1>
        <p class="subtitle">Submit complaints or ideas straight to the Council & Teachers.</p>
        
        <form id="complaintForm">
            <label for="grade">Your Grade</label>
            <select id="grade" required>
                <option value="6th Grade">6th Grade</option>
                <option value="7th Grade">7th Grade</option>
                <option value="8th Grade">8th Grade</option>
                <option value="9th Grade">9th Grade</option>
                <option value="10th Grade">10th Grade</option>
                <option value="11th Grade">11th Grade</option>
                <option value="12th Grade">12th Grade</option>
            </select>

            <label for="category">Submission Type</label>
            <select id="category" required>
                <option value="Complaint">Complaint</option>
                <option value="Request Help">Request Help</option>
                <option value="Event Idea">Event Idea</option>
            </select>

            <label for="message">Your Message</label>
            <textarea id="message" rows="3" placeholder="Drop your honest feedback or ideas here..." required></textarea>

            <button type="submit" id="submitBtn">Submit to Dashboard</button>
        </form>
        
        <button class="button admin-btn" onclick="loginAdmin()">🔒 Council & Teacher View</button>
    </div>

    <div id="adminContainer" class="container admin-panel hidden">
        <h3>🔑 Captain & Teacher Inbox</h3>
        <p style="color: #8892b0; text-align: center; font-size: 14px; margin-top: -10px; margin-bottom: 20px;">Universal Live Engine (Syncs automatically across all separate devices).</p>
        <div class="chat-box" id="adminChatBox">
            <p id="noMsgs" class="status-text">No entries loaded yet.</p>
        </div>
    </div>

    <script>
        const FORMSPARK_FORM_ID = "G1W26HQC7nYRAYnZXF1ALmYb"; 
        
        // --- This is your actual working link placed in the correct variable ---
        const NPOINT_URL = "https://api.npoint.io/c103846f0251f1ebc051";

        const form = document.getElementById('complaintForm');
        const adminChatBox = document.getElementById('adminChatBox');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const grade = document.getElementById('grade').value;
            const category = document.getElementById('category').value;
            const messageText = document.getElementById('message').value;

            const now = new Date();
            const timestamp = now.toLocaleDateString() + ' @ ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const payload = { grade, category, messageText, timestamp };

            fetch(`https://submit-form.com/${FORMSPARK_FORM_ID}`, {
                method: "POST",
                headers: { "Content-Type": "application/json", Accept: "application/json" },
                body: JSON.stringify({ Grade: grade, Type: category, Message: messageText, SentAt: timestamp }),
            });

            fetch(NPOINT_URL)
            .then(res => res.json())
            .then(currentData => {
                let updated = Array.isArray(currentData) ? currentData : [];
                updated.push(payload);

                return fetch(NPOINT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(updated)
                });
            })
            .then(() => {
                form.reset();
                alert("Success! Message synced universally.");
                if (!document.getElementById('adminContainer').classList.contains('hidden')) {
                    fetchUniversalMessages();
                }
            })
            .catch(err => {
                console.error(err);
                alert("Database sync issue.");
            });
        });

        function renderAllMessages(arr) {
            adminChatBox.innerHTML = '';
            if (!arr || arr.length === 0) {
                adminChatBox.innerHTML = '<p class="status-text">No submissions found in cloud server.</p>';
                return;
            }
            const reversed = [...arr].reverse();
            reversed.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `
                    <div class="tag-row">
                        <div class="tag-group">
                            <span class="tag">${msg.grade || 'General'}</span>
                            <span class="tag type-tag">${msg.category || 'Feedback'}</span>
                        </div>
                        <span class="time-stamp">${msg.timestamp || ''}</span>
                    </div>
                    <p class="msg-text">"${msg.messageText || ''}"</p>
                `;
                adminChatBox.appendChild(msgDiv);
            });
        }

        function fetchUniversalMessages() {
            adminChatBox.innerHTML = '<p class="status-text">Connecting to cloud network data loop...</p>';
            
            fetch(NPOINT_URL)
            .then(res => res.json())
            .then(messages => {
                renderAllMessages(messages);
            })
            .catch(() => {
                adminChatBox.innerHTML = '<p class="status-text">No active messages recorded on the sync grid yet.</p>';
            });
        }

        function loginAdmin() {
            const password = prompt("Enter the Poseidon Passcode:");
            if (password === "poseidon2026") {
                document.getElementById('adminContainer').classList.remove('hidden');
                fetchUniversalMessages();
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else {
                alert("Incorrect passcode. Access denied.");
            }
        }
    </script>

</body>
</html>
